<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>404 - Page Not Found</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1020;
        --bg-accent: #121a33;
        --text: #f5f7ff;
        --muted: #aeb7d1;
        --line: rgba(255, 255, 255, 0.14);
        --glow: rgba(122, 162, 255, 0.28);
        --button: #f5f7ff;
        --button-text: #0b1020;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(122, 162, 255, 0.18), transparent 40%),
          radial-gradient(circle at bottom right, rgba(69, 224, 198, 0.12), transparent 34%),
          linear-gradient(160deg, var(--bg), var(--bg-accent));
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(100%, 720px);
        padding: clamp(24px, 5vw, 48px);
        border: 1px solid var(--line);
        border-radius: 28px;
        background: rgba(7, 12, 25, 0.62);
        backdrop-filter: blur(18px);
        box-shadow:
          0 24px 80px rgba(0, 0, 0, 0.38),
          0 0 0 1px rgba(255, 255, 255, 0.03) inset;
        position: relative;
        overflow: hidden;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: -1px;
        background: linear-gradient(135deg, transparent 0%, rgba(255, 255, 255, 0.08) 50%, transparent 100%);
        pointer-events: none;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        font-size: 0.9rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: linear-gradient(180deg, #8fb3ff, #5c7cff);
        box-shadow: 0 0 24px var(--glow);
      }

      h1 {
        margin: 22px 0 12px;
        font-size: clamp(2rem, 6vw, 4rem);
        line-height: 0.95;
        letter-spacing: -0.08em;
      }

      p {
        margin: 0;
        max-width: 42rem;
        color: var(--muted);
        font-size: clamp(1rem, 2.4vw, 1.15rem);
        line-height: 1.7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }

      a {
        text-decoration: none;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 18px;
        border-radius: 999px;
        font-weight: 700;
        transition: transform 160ms ease, box-shadow 160ms ease, background-color 160ms ease;
      }

      .button.primary {
        background: var(--button);
        color: var(--button-text);
        box-shadow: 0 12px 30px rgba(255, 255, 255, 0.08);
      }

      .button.secondary {
        color: var(--text);
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.03);
      }

      .button:hover {
        transform: translateY(-1px);
      }

      .meta {
        margin-top: 24px;
        color: rgba(174, 183, 209, 0.82);
        font-size: 0.92rem;
      }

      .url {
        margin-top: 12px;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.03);
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .url a {
        color: var(--text);
      }

      @media (max-width: 520px) {
        .card {
          border-radius: 22px;
        }

        .actions {
          flex-direction: column;
        }

        .button {
          width: 100%;
        }
      }
    </style>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const suggested = new URL(location.pathname + location.search + location.hash, "https://purl.org");
        const link = document.getElementById("suggested-link");
        const button = document.getElementById("suggested-button");
        const urlText = document.getElementById("suggested-url");

        if (link) {
          link.href = suggested.toString();
          link.textContent = suggested.toString();
        }

        if (button) {
          button.href = suggested.toString();
        }

        if (urlText) {
          urlText.textContent = suggested.toString();
        }
      });
    </script>
  </head>
  <body>
    <main>
      <section class="card" aria-labelledby="page-title">
        <div class="eyebrow">
          <span class="dot" aria-hidden="true"></span>
          404 Not Found
        </div>
        <h1 id="page-title">ページが見つかりません</h1>
        <p>
          そのURLは削除されたか、移動したか、最初から存在していないようです。
          代わりに、<code>purl.org</code> をオーソリティにした本来の候補URLを案内します。
        </p>
        <p class="url">
          <a id="suggested-link" href="https://purl.org/">https://purl.org/</a>
        </p>
        <div class="actions">
          <a class="button primary" id="suggested-button" href="https://purl.org/">候補URLを開く</a>
          <a class="button secondary" href="javascript:history.back()">前のページへ</a>
        </div>
        <p class="meta" id="suggested-url">
          https://purl.org/
        </p>
      </section>
    </main>
  </body>
</html>
